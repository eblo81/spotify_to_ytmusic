name: Sync Spotify to YouTube Music

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install spotify_to_ytmusic

      - name: Create settings file
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          YTMUSIC_COOKIE: ${{ secrets.YTMUSIC_COOKIE }}
        run: |
          CACHE_DIR=$(python3 -c "import platformdirs; print(platformdirs.user_cache_dir(appname='spotify_to_ytmusic', appauthor=False, ensure_exists=True))")

          python3 << PYEOF
          import json, os, configparser
          from pathlib import Path
          import platformdirs

          cache_dir = Path(platformdirs.user_cache_dir(appname="spotify_to_ytmusic", appauthor=False, ensure_exists=True))

          cookie = os.environ['YTMUSIC_COOKIE']
          headers = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36",
              "Accept": "*/*",
              "Accept-Language": "en-US,en;q=0.9",
              "Content-Type": "application/json",
              "Cookie": cookie,
              "X-Goog-AuthUser": "0",
              "x-origin": "https://music.youtube.com"
          }

          # Scrivi headers.json separato
          headers_path = cache_dir / "headers.json"
          headers_path.write_text(json.dumps(headers))

          # Scrivi settings.ini
          config = configparser.ConfigParser()
          config["youtube"] = {
              "headers": str(headers_path),
              "user_id": "",
              "auth_type": "browser"
          }
          config["spotify"] = {
              "client_id": os.environ["SPOTIPY_CLIENT_ID"],
              "client_secret": os.environ["SPOTIPY_CLIENT_SECRET"],
              "use_oauth": "False"
          }
          settings_path = cache_dir / "settings.ini"
          with open(settings_path, "w") as f:
              config.write(f)

          print(f"Settings written to {settings_path}")
          print(f"Headers written to {headers_path}")
          PYEOF

      - name: Run sync
        run: spotify_to_ytmusic all 21newifszcn57jsgimmo6uqga
