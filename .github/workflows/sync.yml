name: Sync Spotify to YouTube Music

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install spotify_to_ytmusic

      - name: Debug - find settings path
        run: |
          python3 -c "
          import spotify_to_ytmusic.settings as s
          import inspect
          print(inspect.getsource(s))
          "

      - name: Create settings file
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          YTMUSIC_COOKIE: ${{ secrets.YTMUSIC_COOKIE }}
        run: |
          mkdir -p ~/.config/spotify_to_ytmusic
          cat > ~/.config/spotify_to_ytmusic/settings.ini << EOF
          [spotify]
          client_id = ${SPOTIPY_CLIENT_ID}
          client_secret = ${SPOTIPY_CLIENT_SECRET}
          redirect_uri = https://localhost/callback

          [ytmusic]
          cookie = ${YTMUSIC_COOKIE}
          EOF

      - name: Run sync
        run: spotify_to_ytmusic all 21newifszcn57jsgimmo6uqga
