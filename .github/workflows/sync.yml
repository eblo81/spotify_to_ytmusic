name: Sync Spotify to YouTube Music

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install spotify_to_ytmusic

      - name: Debug - show ytmusic.py source
        run: |
          python3 -c "
          from pathlib import Path
          import spotify_to_ytmusic
          p = Path(spotify_to_ytmusic.__file__).parent / 'ytmusic.py'
          print(p.read_text())
          "
