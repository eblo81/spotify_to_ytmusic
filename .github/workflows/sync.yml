name: Sync Spotify to YouTube Music

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install spotify_to_ytmusic

      - name: Create settings file
        env:
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          YTMUSIC_COOKIE: ${{ secrets.YTMUSIC_COOKIE }}
        run: |
          CACHE_DIR=$(python3 -c "import platformdirs; print(platformdirs.user_cache_dir(appname='spotify_to_ytmusic', appauthor=False, ensure_exists=True))")
          echo "Cache dir: $CACHE_DIR"
          cat > "$CACHE_DIR/settings.ini" << EOF
          [spotify]
          client_id = ${SPOTIPY_CLIENT_ID}
          client_secret = ${SPOTIPY_CLIENT_SECRET}
          redirect_uri = https://localhost/callback

          [ytmusic]
          cookie = ${YTMUSIC_COOKIE}
          EOF
          echo "Settings file created at $CACHE_DIR/settings.ini"
          cat "$CACHE_DIR/settings.ini"

      - name: Run sync
        run: spotify_to_ytmusic all 21newifszcn57jsgimmo6uqga
